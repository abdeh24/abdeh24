name: Metrics
on:
  # This will run the workflow once a week (every Monday at 0:00 UTC)
  schedule: [{cron: "0 0 * * 1"}]
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token is needed to access your profile data
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # Basic config - show all repos from your profile
          user: abdeh24
          template: classic
          base: header, activity, community, repositories, coding
          
          # Include all repositories (not limited to current repo)
          repositories: 0
          
          # Output settings
          filename: metrics.svg
          
          # Optional: customize what metrics are shown
          config_timezone: UTC
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          
          # Show contributed repositories and personal repositories
          plugin_repositories: yes
          plugin_repositories_affiliations: owner, collaborator, organization_member
          
      - name: Commit metrics
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add metrics.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "Update metrics"
          git push
