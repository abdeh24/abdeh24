name: Metrics

on:
  # Update automatically every day at midnight
  schedule: [{cron: "0 0 * * *"}]
  # Allow manual workflow triggers
  workflow_dispatch:
  # Run on pushes to the main/master branch
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub Personal Access Token (PAT)
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Replace with your actual GitHub username
          user: abdeh24
          
          # Use the classic template shown in your screenshot
          template: classic
          
          # Sets the timezone to match your local time (WITA/Jakarta)
          config_timezone: Asia/Jakarta
          
          # ---------------------------------------------------
          # Base Sections 
          # (Introduction, Activity, Community, All Repositories)
          # ---------------------------------------------------
          base: header, activity, community, repositories
          
          # ---------------------------------------------------
          # Languages Plugin 
          # (Most used languages across ALL repositories)
          # ---------------------------------------------------
          plugin_languages: yes
          plugin_languages_limit: 8                 # Shows up to 8 languages
          plugin_languages_sections: most-used      # Focuses on most used languages
          plugin_languages_details: percentage      # Shows the percentage bar
          plugin_languages_indepth: no              # Set to 'yes' for deeper analysis (slower)
      
      - name: Commit metrics
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main
          git add metrics.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "Update metrics"
          git push origin main
