name: Metrics
on:
  # This will run the workflow at 0 and 12 UTC every day
  schedule: [{cron: "0 0,12 * * *"}]
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token is needed to access your profile data
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # Basic config
          user: abdeh24
          template: classic
          base: header, activity, community, repositories, coding
          
          # Output settings
          filename: metrics.svg
          
          # Optional: customize what metrics are shown
          config_timezone: UTC
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
      
      - name: Commit metrics
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add metrics.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "Update metrics"
          git push
